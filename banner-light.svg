<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" fill="none" role="img" aria-label="changjoon-park — digital forensics engineer">
  <rect x="0" y="0" width="960" height="240" fill="#fdeade"/>

  <defs>
    <clipPath id="reveal2">
      <rect x="0" y="140" width="0" height="24">
        <animate attributeName="width" values="0;640" begin="0.5s" dur="1.5s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="reveal3">
      <rect x="0" y="162" width="0" height="24">
        <animate attributeName="width" values="0;640" begin="2s" dur="1.5s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <text x="20" y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#18181b" letter-spacing="-0.3">changjoon-park</text>

  <text x="20" y="74" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="400" fill="#71717a" letter-spacing="0.1">digital forensics engineer</text>

  <line x1="20" y1="100" x2="520" y2="100" stroke="#e7d4bf" stroke-width="1"/>

  <text x="20" y="134" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"><tspan fill="#71717a">00000000  </tspan><tspan fill="#d97706" font-weight="600">46 49 4c 45</tspan><tspan fill="#52525b"> 30 00 03 00  8a 7c 12 00 00 00 00 00  |</tspan><tspan fill="#d97706" font-weight="600">FILE</tspan><tspan fill="#52525b">0...|.......|</tspan></text>

  <g clip-path="url(#reveal2)">
    <text x="20" y="156" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"><tspan fill="#71717a">00000010  </tspan><tspan fill="#52525b">69 20 64 65 63 6f 64 65  20 77 68 61 74 20 6f 74  |i decode what ot|</tspan></text>
  </g>

  <g clip-path="url(#reveal3)">
    <text x="20" y="178" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" xml:space="preserve"><tspan fill="#71717a">00000020  </tspan><tspan fill="#52525b">68 65 72 73 20 64 65 6c  65 74 65 2e 00 00 00 00  |hers delete.....|</tspan></text>
  </g>

  <text x="20" y="212" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="400" fill="#a1a1aa" letter-spacing="0.2" opacity="0">fig. 0 — read between the bytes<animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/></text>
</svg>
